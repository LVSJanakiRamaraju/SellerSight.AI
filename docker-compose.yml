services:
  backend:
    build:
      context: ./backend
    container_name: sellersight-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/sellersight.db
    volumes:
      - ./backend/uploads:/app/uploads
      - sellersight_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: sellersight-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  sellersight_data:
